stock_close_data_preprocessing:
  delta_lake:
    bucket: delta-lake-bucket

  feature_engineering:
    publish_indicator_features: true
    indicator_features_path: s3://delta-lake-bucket/feature_engineering/stock_price_indicators

  conventional_gap_trading:
    publish_to_timescale: true

  time_encoding:
    close_model_freq: B
    source_harmonics: [1, 2]
    close_model_harmonics: [1]
    periods:
      month: 12.0
      day: 31.0
      day_of_year: 366.0

  columns:
