stock_close_machine_learning:
  training:
    data_source: feast_online
    tiers:
      - tier1
      - tier2
      - tier3
      - tier5
    pecnet_only_tiers:
      - tier4
      - tier5
      - tier6


  mlflow:
    tracking_uri: auto
    s3_endpoint_url: auto
    aws_access_key_id: admin
    aws_secret_access_key: admin1234
    aws_default_region: us-east-1
    experiment_name: stock_close_training
    tier_experiment_prefix: stock_close
    request_timeout: 60
    request_max_retries: 1
    request_backoff_factor: 1
    server_ready_timeout: 30
    experiment_setup_retries: 3

  mlforecast:
    freq: B
    validation_horizon: 120
    test_horizon: 120
    n_windows: 5
    n_trials: 10
    verbose: true
    estimator_verbose: false
    models:
      - Ridge
      - RandomForest
      - LightGBM
      - XGBoost
      - CatBoost

  statsforecast:
    enabled: true
    freq: B
    seasonal_length: 5
    conformal_n_windows: 5
    level: [80, 95]
    verbose: true
    models:
      - class_name: AutoARIMA
        alias: AutoARIMA
      - class_name: AutoETS
        alias: AutoETS
      - class_name: AutoTheta
        alias: AutoTheta
      - class_name: AutoRegressive
        alias: AutoRegressive

  pecnet:
    enabled: true
    selection_params:
      strategy_by_tier:
        tier1: all_features
        tier2: all_features
        tier3: residual_correlation
        tier4: thesis_wavelet_error_compensated_fusion
        tier5: residual_correlation
        tier6: all_features
      correlation_threshold: 0.08
      force_include_best_if_first: true
      max_selected_features:
      max_selected_features_by_tier:
        tier4: 5
        tier5: 5
    feature_columns_by_tier:
      tier1:
        - prev_open
        - prev_high
        - prev_low
        - prev_volume
      tier2:
        - prev_open
        - prev_high
        - prev_low
        - prev_volume
        - calendar_gap_days
        - month_sin_1
        - month_cos_1
        - month_sin_2
        - month_cos_2
        - day_sin_1
        - day_cos_1
        - day_sin_2
        - day_cos_2
        - day_of_year_sin_1
        - day_of_year_cos_1
        - day_of_year_sin_2
        - day_of_year_cos_2
      tier3:
        - prev_open
        - prev_high
        - prev_low
        - prev_volume
        - calendar_gap_days
        - month_sin_1
        - month_cos_1
        - month_sin_2
        - month_cos_2
        - day_sin_1
        - day_cos_1
        - day_sin_2
        - day_cos_2
        - day_of_year_sin_1
        - day_of_year_cos_1
        - day_of_year_sin_2
        - day_of_year_cos_2
      tier4:
        - prev_open
        - prev_high
        - prev_low
        - prev_volume
        - calendar_gap_days
        - month_sin_1
        - month_cos_1
        - month_sin_2
        - month_cos_2
        - day_sin_1
        - day_cos_1
        - day_sin_2
        - day_cos_2
        - day_of_year_sin_1
        - day_of_year_cos_1
        - day_of_year_sin_2
        - day_of_year_cos_2
      tier5:
        - prev_open
        - prev_high
        - prev_low
        - prev_volume
        - calendar_gap_days
        - month_sin_1
        - month_cos_1
        - month_sin_2
        - month_cos_2
        - day_sin_1
        - day_cos_1
        - day_sin_2
        - day_cos_2
        - day_of_year_sin_1
        - day_of_year_cos_1
        - day_of_year_sin_2
        - day_of_year_cos_2
        - daily_open_lag_1
        - daily_high_lag_1
        - daily_low_lag_1
        - daily_volume_lag_1
        - daily_open_lag_2
        - daily_high_lag_2
        - daily_low_lag_2
        - daily_volume_lag_2
        - daily_open_lag_3
        - daily_high_lag_3
        - daily_low_lag_3
        - daily_volume_lag_3
        - daily_open_lag_4
        - daily_high_lag_4
        - daily_low_lag_4
        - daily_volume_lag_4
        - weekly_open_lag_1
        - weekly_high_lag_1
        - weekly_low_lag_1
        - weekly_close_lag_1
        - weekly_volume_lag_1
        - weekly_open_lag_2
        - weekly_high_lag_2
        - weekly_low_lag_2
        - weekly_close_lag_2
        - weekly_volume_lag_2
        - weekly_open_lag_3
        - weekly_high_lag_3
        - weekly_low_lag_3
        - weekly_close_lag_3
        - weekly_volume_lag_3
        - weekly_open_lag_4
        - weekly_high_lag_4
        - weekly_low_lag_4
        - weekly_close_lag_4
        - weekly_volume_lag_4
      tier6:
        - weekly_close_lag_1
        - calendar_gap_days
        - month_sin_1
        - month_cos_1
        - month_sin_2
        - month_cos_2
        - day_sin_1
        - day_cos_1
        - day_sin_2
        - day_cos_2
        - day_of_year_sin_1
        - day_of_year_cos_1
        - day_of_year_sin_2
        - day_of_year_cos_2
    preprocess_params:
      sampling_periods: [1, 2, 4]
      sampling_statistics: ["mean", "std"]
      sequence_size: 4
      error_sequence_size: 8
      wavelet_type: haar
      scale_factor: 1.3
      normalization_type:
      target_normalization_type: window_mean
      conjoincy: false
    preprocess_params_by_tier:
      tier4:
        sampling_periods: [1, 5]
        sampling_statistics: ["mean"]
        sequence_size: 4
        error_sequence_size: 8
        wavelet_type: haar
        scale_factor: 1.3
        normalization_type:
        target_normalization_type: window_mean
        conjoincy: false
      tier5:
        sampling_periods: [1, 2, 4]
        sampling_statistics: ["mean", "std"]
        sequence_size: 4
        error_sequence_size: 8
        wavelet_type: haar
        scale_factor: 1.3
        normalization_type:
        target_normalization_type: window_mean
        conjoincy: false
      tier6:
        sampling_periods: [1, 4, 8]
        sampling_statistics: ["mean", "std"]
        sequence_size: 4
        error_sequence_size: 8
        wavelet_type: haar
        scale_factor: 1.3
        normalization_type:
        target_normalization_type: window_mean
        conjoincy: false
    hyperparams:
      seed: 42
      learning_rate: 0.001
      epoch_size: 150
      batch_size: 96
      hidden_units_sizes: [32, 64, 32, 16]
    hyperparams_by_tier:
      tier4:
        seed: 42
        learning_rate: 0.001
        epoch_size: 500
        batch_size: 64
        hidden_units_sizes: [64, 32]
      tier5:
        seed: 42
        learning_rate: 0.001
        epoch_size: 500
        batch_size: 96
        hidden_units_sizes: [32, 64, 32, 16]
      tier6:
        seed: 42
        learning_rate: 0.001
        epoch_size: 500
        batch_size: 96
        hidden_units_sizes: [32, 64, 32, 16]

  runtime:
    mlforecast_num_threads: -1
    model_n_jobs: -1
    pecnet_n_jobs: -1
    pecnet_torch_threads_per_worker: 1
    pecnet_torch_device: auto
    pecnet_mps_fallback: true
    local_artifacts_enabled: true
    local_artifact_dir: artifacts/stock_close_training
    model_max_estimators: 300
