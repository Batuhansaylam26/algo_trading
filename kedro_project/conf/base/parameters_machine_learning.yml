stock_close_machine_learning:
  training:
    data_source: feast_online
    tiers:
      - tier1
      - tier2

  mlflow:
    tracking_uri: http://host.docker.internal:5001
    experiment_name: stock_close_training
    tier_experiment_prefix: stock_close
    request_timeout: 60
    request_max_retries: 1
    request_backoff_factor: 1

  mlforecast:
    freq: B
    validation_horizon: 120
    test_horizon: 120
    n_windows: 5
    n_trials: 10
    verbose: true
    models:
      - Ridge
      - RandomForest
      - LightGBM
      - XGBoost
      - CatBoost

  statsforecast:
    enabled: true
    freq: B
    seasonal_length: 5
    conformal_n_windows: 5
    level: [80, 95]
    verbose: true
    models:
      - class_name: AutoARIMA
        alias: AutoARIMA
      - class_name: AutoETS
        alias: AutoETS
      - class_name: AutoTheta
        alias: AutoTheta
      - class_name: AutoRegressive
        alias: AutoRegressive

  pecnet:
    enabled: true
    wandb_project: stock-close-pecnet
    wandb_mode: online
    feature_columns_by_tier:
      tier1:
        - prev_open
        - prev_close
        - prev_high
        - prev_low
        - prev_volume
      tier2:
        - prev_open
        - prev_close
        - prev_high
        - prev_low
        - prev_volume
        - calendar_gap_days
        - month_sin_1
        - month_cos_1
        - month_sin_2
        - month_cos_2
        - day_sin_1
        - day_cos_1
        - day_sin_2
        - day_cos_2
        - day_of_year_sin_1
        - day_of_year_cos_1
        - day_of_year_sin_2
        - day_of_year_cos_2
    preprocess_params:
      sampling_periods: [1, 2, 4]
      sampling_statistics: ["mean", "std"]
      sequence_size: 4
      error_sequence_size: 8
      wavelet_type: haar
      scale_factor: 1.3
      normalization_type:
      target_normalization_type: window_mean
      conjoincy: false
    hyperparams:
      seed: 42
      learning_rate: 0.001
      epoch_size: 150
      batch_size: 96
      hidden_units_sizes: [32, 64, 32, 16]

  runtime:
    mlforecast_num_threads: -1
    model_n_jobs: -1
    model_max_estimators: 300
