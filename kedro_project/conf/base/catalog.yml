# Source and sink systems live outside the local catalog:
# Delta Lake on MinIO, TimescaleDB, Feast, and MLflow.
# Most intermediate datasets stay in memory so Kedro-Viz renders the flow clearly.
# Model-training inputs and model specs are persisted so failed training runs can
# resume from individual model nodes without reloading Feast/Redis.

run_config:
  type: MemoryDataset

stock_close_model_dataset:
  type: MemoryDataset

close_model_dataset_metadata:
  type: MemoryDataset

close_model_publish_metadata:
  type: MemoryDataset

