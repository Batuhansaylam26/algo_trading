services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: yahooquery_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: dataops
      POSTGRES_PASSWORD: dataops
      POSTGRES_DB: dataops
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: yahooquery_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: mlflow_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  create-bucket:
    image: minio/mc
    container_name: mlflow_create_bucket
    restart: on-failure
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 admin admin1234; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p myminio/mlflow-bucket || true;
      mc mb -p myminio/feast-bucket || true;
      mc mb -p myminio/delta-lake-bucket || true;
      mc ls myminio;
      exit 0;
      "

  postgres-mlflow:
    image: postgres:16
    container_name: mlflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow1234
      POSTGRES_DB: mlflow_db
    ports:
      - "5433:5432"
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U mlflow -d mlflow_db",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  mlflow:
    build:
      context: ./docker/mlflow
    image: yahooquery-mlflow:latest
    container_name: mlflow_server
    restart: unless-stopped
    depends_on:
      postgres-mlflow:
        condition: service_healthy
      minio:
        condition: service_started
      create-bucket:
        condition: service_completed_successfully
    ports:
      - "5001:5001"
    environment:
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "admin"
      AWS_SECRET_ACCESS_KEY: "admin1234"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow1234@postgres-mlflow:5432/mlflow_db
      --default-artifact-root s3://mlflow-bucket
      --host 0.0.0.0
      --port 5001
      --allowed-hosts 'host.docker.internal:5001,localhost:*,127.0.0.1:*,mlflow,mlflow_server'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001', timeout=3)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  timescaledb_data:
  minio_data:
  mlflow_postgres_data:
