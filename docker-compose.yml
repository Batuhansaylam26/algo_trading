services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: yahooquery_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: dataops
      POSTGRES_PASSWORD: dataops
      POSTGRES_DB: dataops
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: yahooquery_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: mlflow_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  create-bucket:
    image: minio/mc
    container_name: mlflow_create_bucket
    restart: on-failure
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://minio:9000 admin admin1234; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p myminio/mlflow-bucket || true;
      mc mb -p myminio/feast-bucket || true;
      mc mb -p myminio/delta-lake-bucket || true;
      mc ls myminio;
      exit 0;
      "

  postgres-mlflow:
    image: postgres:16
    container_name: mlflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow1234
      POSTGRES_DB: mlflow_db
    ports:
      - "5433:5432"
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data

  mlflow:
    image: python:3.12-slim
    container_name: mlflow_server
    restart: unless-stopped
    depends_on:
      - postgres-mlflow
      - minio
      - create-bucket
    ports:
      - "5001:5001"
    environment:
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: "admin"
      AWS_SECRET_ACCESS_KEY: "admin1234"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir mlflow psycopg2-binary boto3
        python - <<'PY'
        import boto3
        import socket
        import time
        from botocore.exceptions import ClientError

        for host, port in [("postgres-mlflow", 5432), ("minio", 9000)]:
            while True:
                try:
                    with socket.create_connection((host, port), timeout=3):
                        print(f"{host}:{port} is ready", flush=True)
                        break
                except OSError:
                    print(f"Waiting for {host}:{port}...", flush=True)
                    time.sleep(2)

        s3 = boto3.client(
            "s3",
            endpoint_url="http://minio:9000",
            aws_access_key_id="admin",
            aws_secret_access_key="admin1234",
            region_name="us-east-1",
        )
        for bucket in ["mlflow-bucket", "feast-bucket", "delta-lake-bucket"]:
            try:
                s3.head_bucket(Bucket=bucket)
            except ClientError:
                s3.create_bucket(Bucket=bucket)
            print(f"s3://{bucket} is ready", flush=True)
        PY
        exec mlflow server \
          --backend-store-uri postgresql+psycopg2://mlflow:mlflow1234@postgres-mlflow:5432/mlflow_db \
          --default-artifact-root s3://mlflow-bucket \
          --host 0.0.0.0 \
          --port 5001 \
          --allowed-hosts 'host.docker.internal:5001,localhost:*,127.0.0.1:*,mlflow,mlflow_server'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001', timeout=3)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  timescaledb_data:
  minio_data:
  mlflow_postgres_data:
